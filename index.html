<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plant Guesser</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #1a3d2b;
      --green-mid: #2d6a4f;
      --green-light: #52b788;
      --green-pale: #b7e4c7;
      --cream: #f8f4ec;
      --cream-dark: #ede8dc;
      --text-dark: #1a1a1a;
      --text-mid: #4a4a4a;
      --text-muted: #888;
      --gold: #c9a84c;
      --red-soft: #c0392b;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(82,183,136,0.12) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(45,106,79,0.10) 0%, transparent 50%);
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeDown 0.6s ease both;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--green-dark);
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--text-mid);
      font-size: 0.95rem;
      margin-top: 0.4rem;
    }

    .score-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 1.5rem;
      width: 100%;
      max-width: 560px;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    .metric {
      flex: 1;
      background: white;
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      text-align: center;
    }

    .metric-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .metric-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--green-dark);
    }

    .card {
      background: white;
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius);
      padding: 1.75rem;
      width: 100%;
      max-width: 560px;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s ease both;
    }

    .plant-icon {
      font-size: 3.5rem;
      text-align: center;
      margin-bottom: 1.25rem;
      line-height: 1;
    }

    .clue-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--green-light);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .clue-text {
      font-size: 1rem;
      color: var(--text-mid);
      line-height: 1.7;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .opt-btn {
      background: white;
      border: 1.5px solid var(--cream-dark);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text-dark);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .opt-btn:hover:not(:disabled) {
      border-color: var(--green-light);
      background: #f0faf4;
      transform: translateY(-1px);
    }

    .opt-btn:active:not(:disabled) { transform: scale(0.98); }

    .opt-btn.correct {
      background: #eafaf1;
      border-color: var(--green-mid);
      color: var(--green-dark);
      font-weight: 500;
    }

    .opt-btn.wrong {
      background: #fdf0ef;
      border-color: var(--red-soft);
      color: var(--red-soft);
    }

    .opt-btn:disabled { cursor: default; }

    .feedback {
      width: 100%;
      max-width: 560px;
      min-height: 24px;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      margin-bottom: 0.75rem;
      animation: fadeUp 0.3s ease both;
    }

    .feedback.correct { color: var(--green-mid); }
    .feedback.wrong { color: var(--red-soft); }

    .next-btn {
      width: 100%;
      max-width: 560px;
      padding: 0.9rem;
      background: var(--green-dark);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      animation: fadeUp 0.3s ease both;
    }

    .next-btn:hover { background: var(--green-mid); transform: translateY(-1px); }
    .next-btn:active { transform: scale(0.98); }

    .progress-bar-wrap {
      width: 100%;
      max-width: 560px;
      height: 4px;
      background: var(--cream-dark);
      border-radius: 99px;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--green-light);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .end-card {
      text-align: center;
      padding: 2.5rem 2rem;
      animation: fadeUp 0.5s ease both;
    }

    .end-trophy { font-size: 4rem; margin-bottom: 1rem; }

    .end-score {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--green-dark);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .end-pct {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .end-msg {
      font-size: 1.1rem;
      color: var(--text-mid);
      margin-bottom: 1.75rem;
    }

    .restart-btn {
      padding: 0.85rem 2.5rem;
      background: var(--green-dark);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .restart-btn:hover { background: var(--green-mid); }

    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <h1>🌿 Plant Guesser</h1>
    <p>Read the clue and pick the right plant!</p>
  </header>

  <div class="score-bar">
    <div class="metric">
      <div class="metric-label">Score</div>
      <div class="metric-val" id="score">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Correct</div>
      <div class="metric-val" id="correct-count">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Question</div>
      <div class="metric-val" id="q-num">1/10</div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
  </div>

  <div id="quiz-area" style="width:100%; max-width:560px; display:flex; flex-direction:column; align-items:center;"></div>

  <script>
    var plants = [
      { name: "Sunflower", emoji: "🌻", clue: "I turn my face toward the sun and can grow over 10 feet tall. My seeds are a popular snack loved by birds and humans alike.", options: ["Daisy", "Sunflower", "Tulip", "Marigold"] },
      { name: "Cactus", emoji: "🌵", clue: "I store water in my thick stem and have sharp spines instead of leaves. I thrive in hot, dry desert climates.", options: ["Aloe Vera", "Cactus", "Yucca", "Agave"] },
      { name: "Rose", emoji: "🌹", clue: "Often called the queen of flowers. I have thorny stems and fragrant blooms used in perfumes and given as romantic gifts.", options: ["Lily", "Rose", "Peony", "Hibiscus"] },
      { name: "Bamboo", emoji: "🎋", clue: "I am actually a grass, not a tree. I am one of the fastest-growing plants on Earth and a favourite food of giant pandas.", options: ["Bamboo", "Sugar Cane", "Reed", "Fern"] },
      { name: "Venus Flytrap", emoji: "🪴", clue: "I am a carnivorous plant whose leaves snap shut to trap and digest insects. I am native to the swamps of North and South Carolina.", options: ["Pitcher Plant", "Sundew", "Venus Flytrap", "Bladderwort"] },
      { name: "Lavender", emoji: "💜", clue: "I am a purple flowering herb famous for my calming scent. I am used in aromatherapy, soaps, and cooking.", options: ["Lavender", "Wisteria", "Sage", "Rosemary"] },
      { name: "Oak Tree", emoji: "🌳", clue: "I produce acorns and can live for hundreds of years. My strong, dense wood is prized for furniture and flooring.", options: ["Maple Tree", "Birch Tree", "Oak Tree", "Elm Tree"] },
      { name: "Aloe Vera", emoji: "🌿", clue: "My thick fleshy leaves contain a clear gel used to soothe sunburns and skin irritations. I am a popular easy-care houseplant.", options: ["Aloe Vera", "Cactus", "Jade Plant", "Snake Plant"] },
      { name: "Cherry Blossom", emoji: "🌸", clue: "My delicate pink blooms last only a few weeks each spring. In Japan my flowering season is celebrated with festivals called Hanami.", options: ["Magnolia", "Cherry Blossom", "Apple Blossom", "Dogwood"] },
      { name: "Mint", emoji: "🌱", clue: "I am a fast-spreading herb with a cool, refreshing flavour. I am used in teas, toothpaste, chewing gum, and cocktails.", options: ["Mint", "Basil", "Parsley", "Cilantro"] }
    ];

    var currentIndex = 0;
    var score = 0;
    var correctCount = 0;
    var answered = false;
    var shuffledPlants = shuffleArray(plants);

    function shuffleArray(arr) {
      var copy = arr.slice();
      for (var i = copy.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = copy[i];
        copy[i] = copy[j];
        copy[j] = temp;
      }
      return copy;
    }

    function checkGuess(guess, correctAnswer) {
      if (answered) return;
      answered = true;

      var buttons = document.querySelectorAll('.opt-btn');
      var feedbackEl = document.getElementById('fb');
      var nextBtn = document.getElementById('next-btn');

      for (var i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
        if (buttons[i].textContent === correctAnswer) {
          buttons[i].classList.add('correct');
        }
      }

      if (guess === correctAnswer) {
        score += 10;
        correctCount += 1;
        feedbackEl.textContent = "Correct! Well done.";
        feedbackEl.className = 'feedback correct';
      } else {
        feedbackEl.textContent = "Not quite — it was " + correctAnswer + ".";
        feedbackEl.className = 'feedback wrong';
        for (var j = 0; j < buttons.length; j++) {
          if (buttons[j].textContent === guess) {
            buttons[j].classList.add('wrong');
          }
        }
      }

      document.getElementById('score').textContent = score;
      document.getElementById('correct-count').textContent = correctCount;

      nextBtn.classList.remove('hidden');
    }

    function renderQuestion() {
      answered = false;
      var area = document.getElementById('quiz-area');

      if (currentIndex >= shuffledPlants.length) {
        renderEndScreen();
        return;
      }

      var plant = shuffledPlants[currentIndex];
      var shuffledOptions = shuffleArray(plant.options);

      document.getElementById('q-num').textContent = (currentIndex + 1) + "/" + shuffledPlants.length;
      document.getElementById('score').textContent = score;
      document.getElementById('correct-count').textContent = correctCount;

      var pct = (currentIndex / shuffledPlants.length) * 100;
      document.getElementById('progress-fill').style.width = pct + '%';

      var optionsHTML = '';
      for (var i = 0; i < shuffledOptions.length; i++) {
        optionsHTML += `
          <button class="opt-btn" onclick="checkGuess('${shuffledOptions[i]}', '${plant.name}')">
            ${shuffledOptions[i]}
          </button>
        `;
      }

      area.innerHTML = `
        <div class="card" id="plant-card">
          <div class="plant-icon">${plant.emoji}</div>
          <div class="clue-label">What plant am I?</div>
          <div class="clue-text">${plant.clue}</div>
        </div>
        <div class="options-grid">${optionsHTML}</div>
        <div class="feedback" id="fb"></div>
        <button class="next-btn hidden" id="next-btn" onclick="nextQuestion()">
          ${currentIndex < shuffledPlants.length - 1 ? 'Next plant →' : 'See results →'}
        </button>
      `;
    }

    function nextQuestion() {
      currentIndex += 1;
      renderQuestion();
    }

    function renderEndScreen() {
      var pct = Math.round((correctCount / shuffledPlants.length) * 100);
      var msg = '';
      if (pct >= 90) msg = "You're a master botanist!";
      else if (pct >= 70) msg = "Great plant knowledge!";
      else if (pct >= 50) msg = "Not bad — keep growing!";
      else msg = "Time to hit the garden books.";

      document.getElementById('progress-fill').style.width = '100%';

      document.getElementById('quiz-area').innerHTML = `
        <div class="card end-card">
          <div class="end-trophy">🏆</div>
          <div class="end-score">${correctCount} / ${shuffledPlants.length}</div>
          <div class="end-pct">${pct}% correct · ${score} points</div>
          <div class="end-msg">${msg}</div>
          <button class="restart-btn" onclick="restartGame()">Play again</button>
        </div>
      `;
    }

    function restartGame() {
      currentIndex = 0;
      score = 0;
      correctCount = 0;
      shuffledPlants = shuffleArray(plants);
      renderQuestion();
    }

    renderQuestion();
  </script>

</body>
</html>
